<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>YupooView</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0E10;--nav:#08080A;--c1:#18181C;--c2:#202026;--c3:#2A2A34;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --tx:#fff;--sub:#A0A0B8;--mt:#5A5A72;
  --ac:#4F6EF7;--ac2:#7B93FF;
  --grn:#22C55E;--red:#EF4444;--amber:#F59E0B;
  --r:8px;--r2:14px;--f:'Inter',sans-serif;--nh:58px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--f);min-height:100vh;overflow-x:hidden}
button,input,a{font-family:var(--f)}img{display:block}a{color:inherit;text-decoration:none}

/* ── Nav ── */
.nav{position:fixed;inset:0 0 auto;z-index:600;height:var(--nh);background:rgba(8,8,10,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 18px;gap:12px}
.logo{font-size:15px;font-weight:900;letter-spacing:-.03em;flex-shrink:0}
.logo span{color:var(--ac)}
.nsw{flex:1;max-width:460px;margin:0 auto;display:flex;align-items:center;background:var(--c1);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.nsw:focus-within{border-color:var(--ac)}
.ni{flex:1;background:transparent;border:none;outline:none;padding:8px 12px;font-size:13px;color:var(--tx)}
.ni::placeholder{color:var(--mt)}
.go{background:var(--ac);border:none;color:#fff;padding:6px 13px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .15s;white-space:nowrap}
.go:hover{background:var(--ac2)}
.nacts{display:flex;align-items:center;gap:5px;flex-shrink:0}
.nb{position:relative;background:transparent;border:1px solid var(--b2);color:var(--sub);border-radius:var(--r);padding:5px 10px;font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.nb:hover{color:var(--tx);background:var(--c1)}
.nb.on{border-color:var(--ac);color:var(--ac2)}
.bdg{background:var(--ac);color:#fff;border-radius:20px;padding:1px 5px;font-size:10px;font-weight:700}

/* ── Page ── */
.pg{max-width:1440px;margin:0 auto;padding:calc(var(--nh) + 24px) 18px 60px}

/* ── Hero ── */
#hero{text-align:center;padding:64px 0 44px;animation:fu .5s ease}
.ey{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ac2);background:rgba(79,110,247,.1);border:1px solid rgba(79,110,247,.2);border-radius:20px;padding:4px 12px;margin-bottom:20px}
#hero h1{font-size:clamp(44px,6.5vw,84px);font-weight:900;letter-spacing:-.04em;line-height:1;margin-bottom:14px}
#hero h1 em{font-style:normal;color:var(--ac2)}
#hero p{font-size:14px;color:var(--sub);max-width:380px;margin:0 auto 32px;line-height:1.6}
.hbar{display:flex;max-width:600px;margin:0 auto;background:var(--c1);border:1px solid var(--b2);border-radius:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.hbar:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px rgba(79,110,247,.14)}
.hi{flex:1;background:transparent;border:none;outline:none;padding:14px 17px;font-size:14px;color:var(--tx)}
.hi::placeholder{color:var(--mt)}
.hbar .go{padding:12px 24px;font-size:12px;margin:4px;border-radius:8px}
.chips{margin-top:11px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.chip{font-size:11px;color:var(--sub);background:var(--c1);border:1px solid var(--b1);border-radius:20px;padding:3px 10px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--ac2);color:var(--ac2)}

/* ── Status ── */
#status{margin:18px 0;text-align:center}
.sw{display:inline-flex;flex-direction:column;align-items:center;gap:7px}
.sp{width:28px;height:28px;border:2px solid var(--c2);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.st{font-size:12px;color:var(--sub)}
.er{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);color:#FCA5A5;border-radius:var(--r);padding:10px 14px;font-size:13px;display:inline-block;max-width:500px}

/* ── Progress ── */
.pw{margin:12px 0}
.pt{background:var(--c1);border-radius:4px;height:3px;overflow:hidden}
.pf{height:100%;background:var(--ac);transition:width .3s;border-radius:4px}
.pl{font-size:11px;color:var(--sub);text-align:center;margin-top:4px}

/* ── Store banner ── */
#store-info{display:none;margin-bottom:24px;animation:fu .4s ease}
.scard{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r2);padding:18px 20px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.sav{width:56px;height:56px;border-radius:50%;object-fit:cover;background:var(--c2);border:2px solid var(--b2);flex-shrink:0}
.savph{width:56px;height:56px;border-radius:50%;background:var(--c2);border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.smeta{flex:1;min-width:160px}
.snm{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}
.shd{font-size:11px;color:var(--mt);margin-bottom:6px}
.sds{font-size:12px;color:var(--sub);line-height:1.5;max-width:460px}
.sside{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start}

/* ── Contact chips ── */
.ctw{margin-top:12px}
.ctl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mt);margin-bottom:7px}
.ctlist{display:flex;flex-wrap:wrap;gap:6px}
.ctchip{display:flex;align-items:center;gap:6px;background:var(--c2);border:1px solid var(--b1);border-radius:var(--r);padding:6px 10px;transition:border-color .15s}
.ctchip:hover{border-color:var(--b2)}
.ctico{font-size:13px;flex-shrink:0}
.ctlbl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.08em}
.ctvl{font-size:12px;font-weight:500;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctacts{display:flex;gap:3px;margin-left:3px}
.ctbtn{background:var(--c1);border:1px solid var(--b1);color:var(--sub);border-radius:4px;padding:2px 7px;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.ctbtn:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
.ctbtn.ok{background:var(--grn);color:#fff;border-color:var(--grn)}

/* ── Section ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:7px}
.sttl{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.cb{background:var(--c2);border:1px solid var(--b1);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--sub)}
.smbtn{display:inline-flex;align-items:center;gap:5px;background:var(--c1);border:1px solid var(--b1);color:var(--sub);border-radius:var(--r);padding:6px 12px;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.smbtn:hover{border-color:var(--ac);color:var(--ac2)}

/* ── Albums grid ── */
#alb-sec{display:none;margin-bottom:32px;animation:fu .4s ease .05s both}
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px}
.ac{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative}
.ac:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);border-color:var(--b2)}
.ac.loading-album::after{content:'';position:absolute;inset:0;background:rgba(79,110,247,.12);border-radius:var(--r2);pointer-events:none}
.ath{width:100%;aspect-ratio:1;object-fit:cover;background:var(--c2)}
.aph{width:100%;aspect-ratio:1;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--c3)}
.afoo{padding:8px 10px}
.anm{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.act{font-size:10px;color:var(--mt)}

/* ── Product lightbox ── */
#plb{position:fixed;inset:0;z-index:900;display:flex;align-items:stretch;opacity:0;pointer-events:none;transition:opacity .2s}
#plb.open{opacity:1;pointer-events:all}
.plb-back{position:absolute;inset:0;background:rgba(0,0,0,.94);backdrop-filter:blur(14px)}
.plb-layout{position:relative;z-index:1;display:flex;width:100%;height:100%;flex-direction:column}

/* Top bar */
.plb-top{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(14,14,16,.8);border-bottom:1px solid var(--b1);flex-shrink:0}
.plb-title{font-size:13px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plb-ctr{font-size:11px;color:var(--sub);white-space:nowrap}
.ib{width:32px;height:32px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#fff;transition:all .15s;flex-shrink:0}
.ib:hover{background:rgba(255,255,255,.16)}
.ib.cl:hover{background:var(--red);border-color:var(--red)}

/* Main area */
.plb-main{flex:1;display:flex;overflow:hidden;min-height:0}

/* Image area */
.plb-img-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:zoom-in}
.plb-img-area.zoomed{cursor:grab}
.plb-img-area.zoomed:active{cursor:grabbing}
#plb-img{max-width:100%;max-height:100%;object-fit:contain;transform-origin:center;transition:transform .08s;user-select:none;pointer-events:none;transition:opacity .2s}
#plb-img.switching{opacity:0}
.plb-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:2}
.plb-nav.pr{left:10px}
.plb-nav.nx{right:10px}

/* Sidebar */
.plb-side{width:300px;flex-shrink:0;background:rgba(18,18,22,.97);border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow-y:auto}
.ps{padding:14px 15px;border-bottom:1px solid var(--b1)}
.pstitle{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mt);margin-bottom:10px}

/* Buy buttons — most prominent */
.buy-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--r);padding:11px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;margin-bottom:7px;border:none;text-decoration:none;text-align:center}
.buy-btn.wd{background:rgba(255,82,82,.15);color:#FF7070;border:1.5px solid rgba(255,82,82,.35)}
.buy-btn.wd:hover{background:rgba(255,82,82,.25);color:#FF5555}
.buy-btn.tb{background:rgba(255,103,0,.12);color:#FF7020;border:1.5px solid rgba(255,103,0,.3)}
.buy-btn.tb:hover{background:rgba(255,103,0,.22)}
.buy-btn.g16{background:rgba(255,170,0,.1);color:#FFB800;border:1.5px solid rgba(255,170,0,.25)}
.buy-btn.g16:hover{background:rgba(255,170,0,.2)}
.buy-btn-icon{font-size:16px}

/* Like button */
.like-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--c2);border:1.5px solid var(--b2);color:var(--tx);border-radius:var(--r);padding:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.like-btn:hover{border-color:var(--red);color:var(--red)}
.like-btn.liked{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}

/* Actions 2x2 */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.act-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--c2);border:1px solid var(--b1);border-radius:var(--r);padding:8px 4px;cursor:pointer;transition:all .15s;font-size:10px;color:var(--sub);text-align:center}
.act-btn:hover{border-color:var(--ac);color:var(--ac2)}
.act-btn .ic{font-size:16px}

/* Contact rows in sidebar */
.ct-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1)}
.ct-row:last-child{border-bottom:none}
.ct-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.ct-inf{flex:1;min-width:0}
.ct-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--mt)}
.ct-val{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcp{background:var(--c1);border:1px solid var(--b1);color:var(--mt);border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;transition:all .15s;flex-shrink:0;text-decoration:none;display:inline-block;margin-left:2px}
.mcp:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
.mcp.ok{background:var(--grn);color:#fff;border-color:var(--grn)}

/* Thumbnail strip */
.plb-strip{flex-shrink:0;height:74px;background:rgba(10,10,12,.9);border-top:1px solid var(--b1);display:flex;align-items:center;overflow-x:auto;padding:6px 10px;gap:5px;scrollbar-width:thin;scrollbar-color:var(--c3) transparent}
.plb-strip::-webkit-scrollbar{height:3px}
.plb-strip::-webkit-scrollbar-track{background:transparent}
.plb-strip::-webkit-scrollbar-thumb{background:var(--c3);border-radius:2px}
.sthumb{width:58px;height:58px;flex-shrink:0;border-radius:5px;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:border-color .15s,opacity .15s;opacity:.55;background:var(--c2)}
.sthumb.active{border-color:var(--ac);opacity:1}
.sthumb:hover{opacity:.85}

/* Panels */
.panel{position:fixed;top:0;right:0;bottom:0;width:340px;z-index:800;background:var(--nav);border-left:1px solid var(--b1);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.panel.open{transform:translateX(0)}
.pnlbk{position:fixed;inset:0;z-index:799;background:rgba(0,0,0,.5);display:none}
.pnlbk.open{display:block}
.pnlhd{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;border-bottom:1px solid var(--b1);flex-shrink:0}
.pnlttl{font-size:13px;font-weight:700}
.pnlbd{flex:1;overflow-y:auto;padding:13px}
.pempty{text-align:center;padding:44px 14px;color:var(--mt);font-size:13px;line-height:1.6}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pcard{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s;position:relative}
.pcard:hover{border-color:var(--b2)}
.pcard img{width:100%;aspect-ratio:1;object-fit:cover}
.pci{padding:6px 8px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--sub)}
.prm{position:absolute;top:3px;right:3px;width:19px;height:19px;background:rgba(0,0,0,.65);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.pcard:hover .prm{opacity:1}
.prm:hover{background:var(--red)}
.hitem{display:flex;align-items:center;gap:10px;padding:8px;background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.hitem:hover{border-color:var(--b2)}
.htb{width:42px;height:42px;border-radius:5px;object-fit:cover;background:var(--c2);flex-shrink:0}
.hi2{flex:1;min-width:0}
.hn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hs{font-size:10px;color:var(--mt);margin-top:1px}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--c2);border:1px solid var(--b2);color:var(--tx);border-radius:30px;padding:8px 17px;font-size:12px;z-index:2000;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.plb-side{display:none}.plb-nav.nx{right:6px}.panel{width:100%}.agrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
@media(max-width:600px){#hero h1{font-size:40px}.agrid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="logo">YUPOO<span>VIEW</span></div>
  <div class="nsw" id="nsw" style="display:none">
    <input class="ni" id="nurl" placeholder="Paste Yupoo URL…" autocomplete="off" spellcheck="false"/>
    <button class="go" onclick="load()">Go</button>
  </div>
  <div class="nacts">
    <button class="nb" id="favbtn" onclick="openPanel('fav')">♥ Saved <span class="bdg" id="favbdg" style="display:none">0</span></button>
    <button class="nb" onclick="openPanel('hist')">◷ History</button>
  </div>
</nav>

<div class="pg">
  <!-- Hero -->
  <div id="hero">
    <div class="ey">Clean Gallery Viewer</div>
    <h1>Browse.<br/><em>Buy faster.</em></h1>
    <p>Paste any Yupoo store — every product, every photo, buy links in one click.</p>
    <div class="hbar">
      <input class="hi" id="hurl" placeholder="https://seller.yupoo.com  or  …/albums/ID" autocomplete="off" spellcheck="false"/>
      <button class="go" onclick="load()">Browse →</button>
    </div>
    <div class="chips">
      <span class="chip" onclick="fv('https://mook-official.x.yupoo.com')">mook-official example</span>
      <span class="chip" onclick="fv('https://username.yupoo.com/albums/xyz')">album link</span>
    </div>
  </div>

  <!-- Status -->
  <div id="status"></div>

  <!-- Store -->
  <div id="store-info">
    <div class="scard">
      <div id="sav"></div>
      <div class="smeta">
        <div id="snm" class="snm"></div>
        <div id="shd" class="shd"></div>
        <div id="sds" class="sds"></div>
        <div id="sct" class="ctw"></div>
      </div>
      <div class="sside">
        <button class="smbtn" onclick="shareStore()">🔗 Share store</button>
      </div>
    </div>
  </div>

  <!-- Albums -->
  <section id="alb-sec">
    <div class="sh">
      <div class="sttl">Products <span class="cb" id="albcnt">0</span></div>
      <div id="alb-prog" style="display:none">
        <div class="pw"><div class="pt"><div class="pf" id="apf" style="width:0%"></div></div></div>
      </div>
    </div>
    <div class="agrid" id="agrid"></div>
  </section>
</div>

<!-- Product lightbox -->
<div id="plb">
  <div class="plb-back" onclick="closePlb()"></div>
  <div class="plb-layout">
    <!-- Top bar -->
    <div class="plb-top">
      <div class="ib cl" onclick="closePlb()">✕</div>
      <div class="plb-title" id="plb-ttl">Loading…</div>
      <div class="plb-ctr" id="plb-ctr"></div>
      <div class="ib" onclick="resetZoom()" title="Reset zoom">⊙</div>
    </div>
    <!-- Main -->
    <div class="plb-main">
      <!-- Image -->
      <div class="plb-img-area" id="plb-area">
        <img id="plb-img" src="" alt="" draggable="false"/>
        <div class="plb-nav pr ib" onclick="lbNav(-1)">‹</div>
        <div class="plb-nav nx ib" onclick="lbNav(1)">›</div>
      </div>
      <!-- Sidebar -->
      <div class="plb-side">

        <!-- Buy links -->
        <div class="ps" id="ps-buy" style="display:none">
          <div class="pstitle">Buy this item</div>
          <div id="buy-links"></div>
        </div>

        <!-- Like + actions -->
        <div class="ps">
          <button class="like-btn" id="like-btn" onclick="toggleLike()">
            <span id="lbhrt">♡</span><span id="lbtxt">Save</span>
          </button>
          <div style="margin-top:7px" class="act-grid">
            <div class="act-btn" onclick="lbCopy()"><div class="ic">📋</div>Copy URL</div>
            <div class="act-btn" onclick="lbDl()"><div class="ic">↓</div>Download</div>
            <div class="act-btn" onclick="lbWA()"><div class="ic">📱</div>WhatsApp</div>
            <div class="act-btn" onclick="lbTG()"><div class="ic">✈️</div>Telegram</div>
          </div>
        </div>

        <!-- Contact -->
        <div class="ps" id="ps-ct" style="display:none">
          <div class="pstitle">Contact seller</div>
          <div id="ct-list"></div>
        </div>

      </div>
    </div>
    <!-- Thumbnail strip -->
    <div class="plb-strip" id="plb-strip"></div>
  </div>
</div>

<!-- Panels -->
<div class="pnlbk" id="pnlbk" onclick="closePanel()"></div>
<div class="panel" id="fav-panel">
  <div class="pnlhd">
    <div class="pnlttl">♥ Saved</div>
    <div style="display:flex;gap:5px;align-items:center">
      <button class="smbtn" onclick="clearFavs()" style="padding:3px 8px;font-size:10px">Clear all</button>
      <div class="ib cl" onclick="closePanel()" style="width:26px;height:26px;font-size:12px">✕</div>
    </div>
  </div>
  <div class="pnlbd"><div class="pgrid" id="favgrid"></div></div>
</div>
<div class="panel" id="hist-panel">
  <div class="pnlhd">
    <div class="pnlttl">◷ History</div>
    <div style="display:flex;gap:5px;align-items:center">
      <button class="smbtn" onclick="clearHist()" style="padding:3px 8px;font-size:10px">Clear</button>
      <div class="ib cl" onclick="closePanel()" style="width:26px;height:26px;font-size:12px">✕</div>
    </div>
  </div>
  <div class="pnlbd" id="histbd"></div>
</div>

<div id="toast"></div>

<script>
/* ═══ STATE ══════════════════════════════════════════════════════════════ */
const S = {
  url:'', store:null, contact:{},
  /* lightbox */
  albumUrl:'', albumTitle:'', photos:[], lbIdx:0, shopLinks:[],
  /* zoom */
  zoom:1, px:0, py:0, drag:false, ds:null,
};

/* ═══ UTILS ══════════════════════════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const ce = (t,c,h='') => { const e=document.createElement(t); if(c)e.className=c; if(h)e.innerHTML=h; return e; };
const esc= s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ICONS={wechat:'💬',whatsapp:'📱',telegram:'✈️',instagram:'📸',email:'📧',qq:'🐧',weidian:'🛒',taobao:'🛍️','1688':'🏭'};
const LNKS={whatsapp:v=>`https://wa.me/${v.replace(/\D/g,'')}`,telegram:v=>`https://t.me/${v.replace('@','')}`,email:v=>`mailto:${v}`,instagram:v=>`https://instagram.com/${v.replace('@','')}`};

function toast(m,ms=2000){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}
function showSt(h){$('status').innerHTML=h;}
function clearSt(){$('status').innerHTML='';}
function loader(m){showSt(`<div class="sw"><div class="sp"></div><div class="st">${m}</div></div>`);}
function show(id){$(id).style.display='block';}
function hide(id){$(id).style.display='none';}
function fv(u){($('hurl')||$('nurl')).value=u;}

/* ═══ INPUT ══════════════════════════════════════════════════════════════ */
$('hurl').addEventListener('keydown',e=>{ if(e.key==='Enter') load(); });
document.addEventListener('keydown',e=>{
  const lb=$('plb').classList.contains('open');
  if(lb){ if(e.key==='ArrowRight')lbNav(1); if(e.key==='ArrowLeft')lbNav(-1); if(e.key==='Escape')closePlb(); if(e.key==='0')resetZoom(); return; }
  if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){
    e.preventDefault(); const i=$('nurl')||$('hurl'); i.focus(); i.select();
  }
});

/* ═══ LOAD ═══════════════════════════════════════════════════════════════ */
async function load(){
  const url=(($('hurl')||{}).value||($('nurl')||{}).value||'').trim();
  if(!url) return;
  S.url=url;
  hide('hero'); hide('store-info'); hide('alb-sec');
  $('nsw').style.display='flex';
  if($('nurl')) $('nurl').value=url;
  loader('Resolving…');
  try{
    const info=await api('/api/resolve?url='+encodeURIComponent(url));
    if(info.type==='album'){
      await fetchStore(info.storeUrl||url);
      openAlbum(info.albumUrl||url,'');
    } else {
      await fetchStore(url);
    }
  }catch(e){ showSt(`<div class="er">❌ ${e.message||'Failed — check the URL'}</div>`); }
}

/* ═══ STORE ══════════════════════════════════════════════════════════════ */
async function fetchStore(url){
  loader('Loading store…');
  try{
    const d=await api('/api/store?url='+encodeURIComponent(url));
    S.store=d; S.contact=d.contact||{};
    renderStore(d);
    addHist({url, name:d.name||d.username, handle:d.username, thumb:d.avatar||''});
    clearSt();
    // Auto-load remaining album pages
    if(d.totalAlbumPages>1) loadMoreAlbums(url, d.totalAlbumPages);
  }catch(e){ showSt(`<div class="er">❌ ${e.message}</div>`); }
}

function renderStore(d){
  const av=$('sav'); av.innerHTML='';
  if(d.avatar){ const img=document.createElement('img'); img.src=d.avatar; img.className='sav'; img.onerror=()=>{av.innerHTML='<div class="savph">🏪</div>';}; av.appendChild(img); }
  else av.innerHTML='<div class="savph">🏪</div>';
  $('snm').textContent=d.name||d.username;
  $('shd').textContent='@'+d.username;
  $('sds').textContent=d.desc||'';
  renderContact(d.contact||{}, 'sct');
  // Render albums
  const grid=$('agrid'); grid.innerHTML='';
  (d.albums||[]).forEach(a=>grid.appendChild(makeAlbCard(a)));
  $('albcnt').textContent=(d.albums||[]).length;
  show('alb-sec'); show('store-info');
}

async function loadMoreAlbums(url, totalPages){
  show('alb-prog');
  for(let p=2;p<=Math.min(totalPages,20);p++){
    try{
      const d=await api(`/api/albums?url=${encodeURIComponent(url)}&page=${p}`);
      const grid=$('agrid');
      (d.albums||[]).forEach(a=>grid.appendChild(makeAlbCard(a)));
      $('albcnt').textContent=grid.children.length;
      $('apf').style.width=Math.round((p-1)/(totalPages-1)*100)+'%';
    }catch(_){ break; }
  }
  hide('alb-prog');
}

function makeAlbCard(a){
  const card=ce('div','ac');
  card.onclick=()=>openAlbum(a.url, a.title);
  if(a.thumbnail){
    const img=document.createElement('img'); img.className='ath'; img.loading='lazy'; img.alt=a.title; img.src=a.thumbnail;
    img.onerror=()=>img.replaceWith(albPh());
    card.appendChild(img);
  } else card.appendChild(albPh());
  const f=ce('div','afoo');
  f.innerHTML=`<div class="anm">${esc(a.title)}</div><div class="act">${esc(a.count)}</div>`;
  card.appendChild(f); return card;
}
function albPh(){const d=ce('div','aph');d.textContent='🖼️';return d;}

/* ═══ ALBUM / PRODUCT LIGHTBOX ═══════════════════════════════════════════ */
async function openAlbum(url, title){
  S.albumUrl=url; S.albumTitle=title||''; S.photos=[]; S.shopLinks=[];
  // Open lightbox immediately in loading state
  $('plb-ttl').textContent='Loading…';
  $('plb-ctr').textContent='';
  $('plb-img').src='';
  $('plb-strip').innerHTML='';
  $('buy-links').innerHTML='';
  $('ps-buy').style.display='none';
  $('plb').classList.add('open');
  document.body.style.overflow='hidden';
  S.zoom=1;S.px=0;S.py=0;applyTx();

  // Fetch all pages of this album
  let page=1, total=1;
  do{
    try{
      const data=await api(`/api/album?url=${encodeURIComponent(url)}&page=${page}`);
      total=data.pagination?.total||1;
      if(page===1){
        S.albumTitle=data.title||title||'Album';
        $('plb-ttl').textContent=S.albumTitle;
        S.shopLinks=data.shopLinks||[];
        if(data.contact&&Object.keys(data.contact).length) S.contact={...S.store?.contact||{},...data.contact};
        renderBuyLinks();
        renderSideContact();
      }
      const offset=S.photos.length;
      S.photos=S.photos.concat(data.photos||[]);
      appendStrip(data.photos||[], offset);
      // Show first photo as soon as page 1 arrives
      if(page===1 && S.photos.length>0){ S.lbIdx=0; setLbImg(0); }
      updateCtr();
    }catch(e){ break; }
    page++;
  }while(page<=total);
}

function renderBuyLinks(){
  const wrap=$('buy-links'); wrap.innerHTML='';
  if(!S.shopLinks||!S.shopLinks.length){ $('ps-buy').style.display='none'; return; }
  S.shopLinks.forEach(lk=>{
    const cls=lk.platform==='Weidian'?'wd':lk.platform==='Taobao'?'tb':'g16';
    const a=ce('a','buy-btn '+cls);
    a.innerHTML=`<span class="buy-btn-icon">${lk.icon}</span> Buy on ${lk.platform}`;
    a.href=lk.url; a.target='_blank'; a.rel='noopener';
    // Also add copy button below
    const cp=ce('button','smbtn');
    cp.style.cssText='width:100%;justify-content:center;margin-bottom:6px;font-size:11px';
    cp.innerHTML='📋 Copy '+lk.platform+' link';
    cp.onclick=()=>cpText(lk.url, cp);
    wrap.appendChild(a);
    wrap.appendChild(cp);
  });
  $('ps-buy').style.display='block';
}

function renderSideContact(){
  const sec=$('ps-ct'), list=$('ct-list');
  list.innerHTML='';
  const entries=Object.entries(S.contact||{}).filter(([k])=>!['weidian','taobao','1688'].includes(k));
  if(!entries.length){ sec.style.display='none'; return; }
  entries.forEach(([k,info])=>{
    const row=ce('div','ct-row');
    row.innerHTML=`<span class="ct-ico">${ICONS[k]||'📌'}</span><div class="ct-inf"><div class="ct-lbl">${esc(info.label)}</div><div class="ct-val">${esc(info.value)}</div></div>`;
    if(LNKS[k]){ const a=ce('a','mcp','Open'); a.href=LNKS[k](info.value); a.target='_blank'; a.rel='noopener'; row.appendChild(a); }
    const cp=ce('button','mcp','Copy'); cp.onclick=()=>cpText(info.value,cp); row.appendChild(cp);
    list.appendChild(row);
  });
  sec.style.display='block';
}

function appendStrip(photos, offset){
  const strip=$('plb-strip');
  photos.forEach((ph,i)=>{
    const idx=offset+i;
    const img=document.createElement('img');
    img.className='sthumb'+(idx===0?' active':'');
    img.src=ph.thumbnail||ph.full;
    img.alt='';
    img.loading='lazy';
    img.dataset.idx=idx;
    img.onerror=()=>img.style.display='none';
    img.onclick=()=>setLbImg(idx);
    strip.appendChild(img);
  });
}

function setLbImg(idx){
  const ph=S.photos[idx];
  if(!ph) return;
  S.lbIdx=idx;
  const img=$('plb-img');
  img.classList.add('switching');
  setTimeout(()=>{
    img.src=ph.full||ph.thumbnail;
    img.classList.remove('switching');
  },120);
  // Update strip active
  document.querySelectorAll('.sthumb').forEach(t=>{
    t.classList.toggle('active', Number(t.dataset.idx)===idx);
  });
  // Scroll strip to active
  const active=$('.sthumb.active');
  if(active) active.scrollIntoView({inline:'nearest',behavior:'smooth'});
  updateCtr();
  updateLikeBtn(ph);
}

function lbNav(d){
  const l=S.photos.length; if(!l) return;
  setLbImg((S.lbIdx+d+l)%l);
  S.zoom=1;S.px=0;S.py=0;applyTx();
}

function updateCtr(){
  $('plb-ctr').textContent=S.photos.length?`${S.lbIdx+1} / ${S.photos.length}`:'';
}

function closePlb(){
  $('plb').classList.remove('open');
  document.body.style.overflow='';
  resetZoom();
}

/* ═══ ZOOM ═══════════════════════════════════════════════════════════════ */
function applyTx(){
  $('plb-img').style.transform=`scale(${S.zoom}) translate(${S.px/S.zoom}px,${S.py/S.zoom}px)`;
  $('plb-area').className='plb-img-area'+(S.zoom>1?' zoomed':'');
}
function resetZoom(){S.zoom=1;S.px=0;S.py=0;applyTx();}
$('plb-area').addEventListener('wheel',e=>{
  e.preventDefault();
  S.zoom=Math.min(Math.max(1,S.zoom+(e.deltaY<0?.15:-.15)),6);
  if(S.zoom===1){S.px=0;S.py=0;}
  applyTx();
},{passive:false});
$('plb-area').addEventListener('mousedown',e=>{if(S.zoom<=1)return;S.drag=true;S.ds={x:e.clientX-S.px,y:e.clientY-S.py};});
document.addEventListener('mousemove',e=>{if(!S.drag)return;S.px=e.clientX-S.ds.x;S.py=e.clientY-S.ds.y;applyTx();});
document.addEventListener('mouseup',()=>S.drag=false);
$('plb-area').addEventListener('dblclick',()=>{if(S.zoom>1)resetZoom();else{S.zoom=2.5;applyTx();}});

/* ═══ ACTIONS ════════════════════════════════════════════════════════════ */
function lbCopy(){const ph=S.photos[S.lbIdx];if(ph)cpText(ph.full||ph.thumbnail);}
function lbDl(){
  const ph=S.photos[S.lbIdx];if(!ph)return;
  const a=document.createElement('a');a.href=`/proxy/image?url=${encodeURIComponent(ph.full||ph.thumbnail)}&dl=1`;a.download=`photo-${S.lbIdx+1}.jpg`;a.click();
}
function lbWA(){const ph=S.photos[S.lbIdx];if(ph)window.open(`https://wa.me/?text=${encodeURIComponent(ph.full||ph.thumbnail)}`);}
function lbTG(){const ph=S.photos[S.lbIdx];if(ph)window.open(`https://t.me/share/url?url=${encodeURIComponent(ph.full||ph.thumbnail)}`);}

/* ═══ FAVORITES ══════════════════════════════════════════════════════════ */
const getFavs=()=>{try{return JSON.parse(localStorage.getItem('yv_f')||'{}');}catch{return {};}};
const saveFavs=f=>{localStorage.setItem('yv_f',JSON.stringify(f));updateFavBadge();};
const isLiked=ph=>!!getFavs()[ph?.full||ph?.thumbnail||''];

function toggleLike(){
  const ph=S.photos[S.lbIdx];if(!ph)return;
  const f=getFavs(),key=ph.full||ph.thumbnail;
  if(f[key]){delete f[key];toast('Removed');}
  else{f[key]={ph,album:S.albumUrl,albumTitle:S.albumTitle,shopLinks:S.shopLinks,ts:Date.now()};toast('♥ Saved!');}
  saveFavs(f);updateLikeBtn(ph);
}
function updateLikeBtn(ph){
  if(!ph)return;const lk=isLiked(ph);
  $('like-btn').className='like-btn'+(lk?' liked':'');
  $('lbhrt').textContent=lk?'♥':'♡';
  $('lbtxt').textContent=lk?'Saved':'Save';
}
function updateFavBadge(){
  const n=Object.keys(getFavs()).length;
  $('favbdg').textContent=n;$('favbdg').style.display=n?'inline':'none';
  $('favbtn').classList.toggle('on',n>0);
}
function renderFavPanel(){
  const f=getFavs(),grid=$('favgrid');grid.innerHTML='';
  const entries=Object.values(f).sort((a,b)=>b.ts-a.ts);
  if(!entries.length){grid.innerHTML='<div class="pempty">No saved photos.<br/>Click ♡ in the viewer.</div>';return;}
  entries.forEach(({ph,albumTitle,shopLinks,album})=>{
    const card=ce('div','pcard');
    const img=document.createElement('img');img.src=ph.thumbnail||ph.full;img.alt='';img.loading='lazy';img.onerror=()=>img.style.display='none';
    const info=ce('div','pci');info.textContent=albumTitle||'Photo';
    const rm=ce('button','prm','✕');rm.onclick=e=>{e.stopPropagation();const nf=getFavs();delete nf[ph.full||ph.thumbnail];saveFavs(nf);renderFavPanel();};
    card.appendChild(img);card.appendChild(info);card.appendChild(rm);
    card.onclick=()=>{closePanel();if(album)openAlbum(album,albumTitle);};
    grid.appendChild(card);
  });
}
function clearFavs(){if(!confirm('Clear all saved?'))return;localStorage.removeItem('yv_f');updateFavBadge();renderFavPanel();}

/* ═══ HISTORY ════════════════════════════════════════════════════════════ */
const getHist=()=>{try{return JSON.parse(localStorage.getItem('yv_h')||'[]');}catch{return [];}};
function addHist(h){const hist=getHist().filter(x=>x.url!==h.url);hist.unshift({...h,ts:Date.now()});localStorage.setItem('yv_h',JSON.stringify(hist.slice(0,30)));}
const ago=ts=>{const s=Math.floor((Date.now()-ts)/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';};
function renderHistPanel(){
  const hist=getHist(),body=$('histbd');body.innerHTML='';
  if(!hist.length){body.innerHTML='<div class="pempty">No history yet.</div>';return;}
  hist.forEach(h=>{
    const item=ce('div','hitem');
    const img=document.createElement('img');img.className='htb';img.src=h.thumb||'';img.alt='';img.onerror=()=>img.style.display='none';
    const info=ce('div','hi2');info.innerHTML=`<div class="hn">${esc(h.name||h.handle)}</div><div class="hs">@${esc(h.handle)} · ${ago(h.ts)}</div>`;
    item.appendChild(img);item.appendChild(info);
    item.onclick=()=>{closePanel();if($('nurl'))$('nurl').value=h.url;if($('hurl'))$('hurl').value=h.url;S.url='';load();};
    body.appendChild(item);
  });
}
function clearHist(){if(!confirm('Clear history?'))return;localStorage.removeItem('yv_h');renderHistPanel();}

/* ═══ CONTACT ════════════════════════════════════════════════════════════ */
function renderContact(contact,wid){
  const wrap=$(wid);if(!wrap)return;
  const entries=Object.entries(contact||{});if(!entries.length){wrap.innerHTML='';return;}
  let h=`<div class="ctl">Contact Seller</div><div class="ctlist">`;
  entries.forEach(([k,info])=>{
    let acts='';
    if(LNKS[k])acts+=`<a class="ctbtn" href="${LNKS[k](info.value)}" target="_blank" rel="noopener">Open</a>`;
    if(k==='weidian')acts+=`<a class="ctbtn" href="${info.value.startsWith('http')?info.value:'https://weidian.com/shop/'+info.value}" target="_blank" rel="noopener">Shop</a>`;
    if(k==='taobao')acts+=`<a class="ctbtn" href="${info.value.startsWith('http')?info.value:'#'}" target="_blank" rel="noopener">Shop</a>`;
    acts+=`<button class="ctbtn" onclick="cpAndMark(this,'${esc(info.value).replace(/'/g,"\\'")}')">Copy</button>`;
    h+=`<div class="ctchip"><span class="ctico">${ICONS[k]||'📌'}</span><div><div class="ctlbl">${esc(info.label)}</div><div class="ctvl">${esc(info.value)}</div></div><div class="ctacts">${acts}</div></div>`;
  });
  h+='</div>';wrap.innerHTML=h;
}
function cpAndMark(btn,txt){cpText(txt,btn);}

/* ═══ SHARE ══════════════════════════════════════════════════════════════ */
function shareStore(){const u=`${location.origin}/?url=${encodeURIComponent(S.url)}`;cpText(u);toast('Link copied!');}

/* ═══ PANELS ═════════════════════════════════════════════════════════════ */
let curPnl=null;
function openPanel(id){
  if(curPnl)closePanel();
  if(id==='fav')renderFavPanel();
  if(id==='hist')renderHistPanel();
  $(`${id}-panel`).classList.add('open');
  $('pnlbk').classList.add('open');
  curPnl=id;
}
function closePanel(){if(curPnl)$(`${curPnl}-panel`).classList.remove('open');$('pnlbk').classList.remove('open');curPnl=null;}

/* ═══ API / CLIPBOARD ════════════════════════════════════════════════════ */
async function api(p){const r=await fetch(p);const d=await r.json();if(!r.ok)throw new Error(d.error||`HTTP ${r.status}`);return d;}
async function cpText(txt,btn){
  try{
    await navigator.clipboard.writeText(txt);
    if(btn){const o=btn.textContent;btn.textContent='✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent=o;btn.classList.remove('ok');},1500);}
    else toast('Copied!');
  }catch{toast('Copy failed');}
}

/* ═══ BOOT ═══════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded',()=>{
  updateFavBadge();
  const u=new URLSearchParams(location.search).get('url');
  if(u){if($('nurl'))$('nurl').value=u;if($('hurl'))$('hurl').value=u;load();}
});
</script>
</body>

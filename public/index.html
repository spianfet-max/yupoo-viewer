<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yupoo Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & Tokens ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0c0c0f;
  --surface:     #14141a;
  --surface2:    #1c1c26;
  --surface3:    #242433;
  --border:      rgba(255,255,255,.07);
  --border2:     rgba(255,255,255,.12);
  --text:        #e8e8f0;
  --muted:       #7878a0;
  --accent:      #7c6af7;
  --accent2:     #a593ff;
  --accent-glow: rgba(124,106,247,.25);
  --red:         #f76a6a;
  --green:       #6af7a4;
  --r:           12px;
  --r2:          20px;
  --font-head:   'Syne', sans-serif;
  --font-body:   'DM Sans', sans-serif;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Grain overlay ──────────────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity: .4;
}

/* ── Layout ─────────────────────────────────────────────────────────────── */
.app { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* ── Hero header ────────────────────────────────────────────────────────── */
.hero {
  padding: 60px 0 40px;
  text-align: center;
  position: relative;
}
.hero-glow {
  position: absolute;
  top: -60px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
}
.logo {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-head);
  font-size: 13px; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 28px;
}
.logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.hero h1 {
  font-family: var(--font-head);
  font-size: clamp(36px, 6vw, 72px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -.03em;
  background: linear-gradient(135deg, #fff 0%, var(--accent2) 60%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 14px;
}
.hero p {
  color: var(--muted);
  font-size: 15px;
  font-weight: 300;
  max-width: 480px;
  margin: 0 auto 36px;
  line-height: 1.6;
}

/* ── Search bar ─────────────────────────────────────────────────────────── */
.search-wrap {
  display: flex;
  align-items: center;
  gap: 0;
  max-width: 680px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.search-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 16px 20px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text);
}
.search-input::placeholder { color: var(--muted); }
.search-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 14px 28px;
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s, transform .1s;
  white-space: nowrap;
  margin: 4px;
  border-radius: 10px;
}
.search-btn:hover  { background: var(--accent2); }
.search-btn:active { transform: scale(.97); }

.examples {
  margin-top: 14px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.examples span { font-size: 12px; color: var(--muted); }
.example-pill {
  font-size: 12px;
  color: var(--accent2);
  background: rgba(124,106,247,.1);
  border: 1px solid rgba(124,106,247,.2);
  border-radius: 20px;
  padding: 4px 12px;
  cursor: pointer;
  transition: background .2s;
}
.example-pill:hover { background: rgba(124,106,247,.2); }

/* ── Status / loader ────────────────────────────────────────────────────── */
#status { margin: 32px auto; max-width: 400px; text-align: center; }
.loader {
  display: inline-block;
  width: 36px; height: 36px;
  border: 3px solid var(--surface3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-text { margin-top: 10px; color: var(--muted); font-size: 14px; }
.error-box {
  background: rgba(247,106,106,.1);
  border: 1px solid rgba(247,106,106,.25);
  color: #ffaaaa;
  border-radius: var(--r);
  padding: 14px 18px;
  font-size: 14px;
}

/* ── Store info card ────────────────────────────────────────────────────── */
#store-info {
  display: none;
  margin: 40px 0 32px;
  animation: fadeUp .4s ease both;
}
.store-header {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 20px;
  align-items: start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 24px 28px;
  margin-bottom: 20px;
}
.store-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--surface3);
  border: 2px solid var(--border2);
}
.avatar-placeholder {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--surface3);
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  color: var(--muted);
}
.store-name { font-family: var(--font-head); font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.store-username { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.store-desc { font-size: 13px; color: var(--muted); line-height: 1.5; max-width: 480px; }
.store-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }

/* ── Contact card ───────────────────────────────────────────────────────── */
.contact-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 20px 24px;
}
.contact-title {
  font-family: var(--font-head);
  font-size: 11px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.contact-grid { display: flex; flex-direction: column; gap: 10px; }
.contact-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 14px;
  transition: border-color .2s;
}
.contact-row:hover { border-color: var(--border2); }
.contact-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
.contact-info { flex: 1; min-width: 0; }
.contact-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
.contact-value { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.copy-btn {
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  font-family: var(--font-body);
}
.copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.copy-btn.copied { background: var(--green); color: #000; border-color: var(--green); }

/* ── Section headers ────────────────────────────────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
.section-title {
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 700;
}
.section-count {
  font-size: 12px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  margin-left: 8px;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--r);
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font-body);
}
.back-btn:hover { border-color: var(--accent); color: var(--accent2); }

/* ── Album grid ─────────────────────────────────────────────────────────── */
#albums-section { display: none; animation: fadeUp .4s ease .1s both; margin-bottom: 60px; }
.albums-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
.album-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s, border-color .2s, box-shadow .2s;
}
.album-card:hover {
  transform: translateY(-3px);
  border-color: var(--border2);
  box-shadow: 0 12px 32px rgba(0,0,0,.3);
}
.album-thumb {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  background: var(--surface2);
  display: block;
}
.album-thumb-placeholder {
  width: 100%;
  aspect-ratio: 1;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: var(--surface3);
}
.album-info { padding: 12px 14px; }
.album-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.album-count { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ── Photo gallery ───────────────────────────────────────────────────────── */
#gallery-section { display: none; animation: fadeUp .4s ease both; margin-bottom: 60px; }
.gallery-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.share-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--r);
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font-body);
}
.share-btn:hover { border-color: var(--accent); color: var(--accent2); }

.photos-grid {
  columns: 4 200px;
  gap: 10px;
}
.photo-item {
  break-inside: avoid;
  margin-bottom: 10px;
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: var(--surface2);
  transition: transform .2s, box-shadow .2s;
}
.photo-item:hover { transform: scale(1.015); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
.photo-item:hover .photo-overlay { opacity: 1; }
.photo-img {
  width: 100%;
  display: block;
  border-radius: var(--r);
  transition: opacity .3s;
}
.photo-img.loading { opacity: 0; }
.photo-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.35);
  display: flex;
  align-items: flex-end;
  padding: 10px;
  opacity: 0;
  transition: opacity .2s;
  border-radius: var(--r);
}
.photo-num { font-size: 11px; color: rgba(255,255,255,.7); }

/* ── Load more ──────────────────────────────────────────────────────────── */
.load-more-wrap { text-align: center; margin: 32px 0; }
.load-more-btn {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: 50px;
  padding: 12px 32px;
  font-size: 14px;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font-body);
}
.load-more-btn:hover { background: var(--surface3); border-color: var(--accent); }

/* ── Lightbox ───────────────────────────────────────────────────────────── */
#lightbox {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
#lightbox.open { opacity: 1; pointer-events: all; }
.lb-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.92);
  backdrop-filter: blur(8px);
}
.lb-content {
  position: relative;
  z-index: 1;
  max-width: 92vw;
  max-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lb-img {
  max-width: 90vw;
  max-height: 88vh;
  object-fit: contain;
  border-radius: var(--r);
  box-shadow: 0 24px 80px rgba(0,0,0,.5);
  display: block;
}
.lb-close {
  position: fixed;
  top: 20px; right: 20px;
  width: 40px; height: 40px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 18px;
  transition: all .2s;
  z-index: 2;
}
.lb-close:hover { background: var(--red); color: #fff; border-color: var(--red); }
.lb-prev, .lb-next {
  position: fixed;
  top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 20px;
  transition: all .2s;
  z-index: 2;
}
.lb-prev { left: 16px; }
.lb-next { right: 16px; }
.lb-prev:hover, .lb-next:hover { background: var(--accent); border-color: var(--accent); }
.lb-counter {
  position: fixed;
  bottom: 20px; left: 50%; transform: translateX(-50%);
  font-size: 13px; color: rgba(255,255,255,.5);
  background: rgba(0,0,0,.4);
  border-radius: 20px;
  padding: 5px 16px;
  z-index: 2;
  display: flex; gap: 12px; align-items: center;
}
.lb-download {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: background .2s;
}
.lb-download:hover { background: var(--accent2); }

/* ── Share modal ─────────────────────────────────────────────────────────── */
#share-modal {
  position: fixed;
  inset: 0;
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
#share-modal.open { opacity: 1; pointer-events: all; }
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(4px);
}
.modal-box {
  position: relative;
  z-index: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  padding: 28px;
  min-width: 320px;
  max-width: 480px;
  width: 90vw;
  animation: popIn .2s ease;
}
.modal-title { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 14px;
}
.modal-close:hover { color: var(--text); }
.share-url-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.share-url-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: var(--r);
  padding: 10px 14px;
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
}
.share-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.share-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  cursor: pointer;
  transition: all .2s;
  font-size: 14px;
}
.share-opt:hover { border-color: var(--accent); color: var(--accent2); }

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: 30px;
  padding: 10px 22px;
  font-size: 13px;
  z-index: 2000;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Animations ──────────────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes popIn {
  from { transform: scale(.94); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

/* ── Utility ─────────────────────────────────────────────────────────────── */
.hidden { display: none !important; }
.btn-icon { font-size: 15px; }

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .store-header { grid-template-columns: auto 1fr; }
  .store-actions { grid-column: 1/-1; }
  .photos-grid { columns: 2 140px; }
  .albums-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .lb-prev { left: 6px; }
  .lb-next { right: 6px; }
}
@media (max-width: 480px) {
  .hero { padding: 36px 0 28px; }
  .photos-grid { columns: 2 120px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ─── Hero ─── -->
  <div class="hero">
    <div class="hero-glow"></div>
    <div class="logo"><div class="logo-dot"></div>YUPOO VIEWER<div class="logo-dot"></div></div>
    <h1>Gallery, cleaned up.</h1>
    <p>Paste any Yupoo store or album link. Browse with a beautiful, fast gallery — no clutter, no friction.</p>

    <div class="search-wrap">
      <input id="url-input" class="search-input"
             type="text"
             placeholder="https://seller.yupoo.com  or  .../albums/abc123"
             autocomplete="off" spellcheck="false"/>
      <button class="search-btn" onclick="load()">Browse →</button>
    </div>
    <div class="examples">
      <span>Try:</span>
      <span class="example-pill" onclick="fillExample('https://username.yupoo.com')">store page</span>
      <span class="example-pill" onclick="fillExample('https://username.yupoo.com/albums/xyz')">album link</span>
    </div>
  </div>

  <!-- ─── Status ─── -->
  <div id="status"></div>

  <!-- ─── Store info ─── -->
  <div id="store-info">
    <div class="store-header">
      <div id="store-avatar-wrap"></div>
      <div>
        <div id="store-name" class="store-name"></div>
        <div id="store-username" class="store-username"></div>
        <div id="store-desc" class="store-desc"></div>
      </div>
      <div class="store-actions">
        <button class="share-btn" onclick="openShare('store')">🔗 Share</button>
      </div>
    </div>
    <div id="contact-wrap"></div>
  </div>

  <!-- ─── Albums ─── -->
  <section id="albums-section">
    <div class="section-header">
      <div>
        <span class="section-title">Albums</span>
        <span id="albums-count" class="section-count"></span>
      </div>
    </div>
    <div id="albums-grid" class="albums-grid"></div>
  </section>

  <!-- ─── Gallery ─── -->
  <section id="gallery-section">
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <button class="back-btn" onclick="backToAlbums()">← Albums</button>
        <div>
          <span id="gallery-title" class="section-title"></span>
          <span id="gallery-count" class="section-count"></span>
        </div>
      </div>
      <div class="gallery-toolbar">
        <button class="share-btn" onclick="openShare('album')">🔗 Share</button>
        <button class="share-btn" onclick="copyAllImages()" id="copy-all-btn">📋 Copy all URLs</button>
      </div>
    </div>
    <div id="photos-grid" class="photos-grid"></div>
    <div id="load-more-wrap" class="load-more-wrap hidden">
      <button class="load-more-btn" id="load-more-btn" onclick="loadMorePhotos()">Load more photos</button>
    </div>
  </section>

</div><!-- /app -->

<!-- ─── Lightbox ─── -->
<div id="lightbox">
  <div class="lb-backdrop" onclick="closeLightbox()"></div>
  <div class="lb-content">
    <img id="lb-img" class="lb-img" src="" alt=""/>
  </div>
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-prev" onclick="lbNav(-1)">‹</button>
  <button class="lb-next" onclick="lbNav(1)">›</button>
  <div class="lb-counter">
    <span id="lb-counter-text">1 / 1</span>
    <button class="lb-download" onclick="downloadCurrent()">↓ Download</button>
  </div>
</div>

<!-- ─── Share modal ─── -->
<div id="share-modal">
  <div class="modal-backdrop" onclick="closeShare()"></div>
  <div class="modal-box">
    <div class="modal-title">Share</div>
    <button class="modal-close" onclick="closeShare()">✕</button>
    <div class="share-url-row">
      <input id="share-url-input" class="share-url-input" readonly/>
      <button class="copy-btn" onclick="copyShareUrl()">Copy</button>
    </div>
    <div class="share-options">
      <div class="share-opt" onclick="shareWhatsApp()">📱 WhatsApp</div>
      <div class="share-opt" onclick="shareTelegram()">✈️ Telegram</div>
      <div class="share-opt" onclick="shareTwitter()">🐦 X / Twitter</div>
      <div class="share-opt" onclick="copyShareUrl()">📋 Copy link</div>
    </div>
  </div>
</div>

<!-- ─── Toast ─── -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   State
═══════════════════════════════════════════════════════════════════════════ */
const STATE = {
  currentUrl:    '',
  storeData:     null,
  currentAlbum:  null,
  currentPage:   1,
  totalPages:    1,
  photos:        [],     // all loaded photos
  lbIndex:       0,
  shareTarget:   'store', // 'store' | 'album'
};

/* ═══════════════════════════════════════════════════════════════════════════
   DOM helpers
═══════════════════════════════════════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const el = (tag, cls, inner='') => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (inner) e.innerHTML = inner;
  return e;
};

function showStatus(html) { $('status').innerHTML = html; }
function clearStatus()    { $('status').innerHTML = ''; }
function toast(msg, ms=2500) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

/* ═══════════════════════════════════════════════════════════════════════════
   URL input
═══════════════════════════════════════════════════════════════════════════ */
function fillExample(url) {
  $('url-input').value = url;
  $('url-input').focus();
}

$('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') load();
});

/* ═══════════════════════════════════════════════════════════════════════════
   Load (resolve URL → store or album)
═══════════════════════════════════════════════════════════════════════════ */
async function load() {
  const url = $('url-input').value.trim();
  if (!url) return;
  STATE.currentUrl = url;

  // hide previous results
  $('store-info').style.display = 'none';
  $('albums-section').style.display = 'none';
  $('gallery-section').style.display = 'none';

  showStatus('<div class="loader"></div><div class="status-text">Resolving URL…</div>');

  try {
    const info = await api('/api/resolve?url=' + encodeURIComponent(url));
    if (info.type === 'album') {
      await loadAlbum(info.albumUrl || url, info.storeUrl);
    } else {
      await loadStore(url);
    }
  } catch (err) {
    showStatus(`<div class="error-box">❌ ${err.message || 'Failed to load. Check the URL.'}</div>`);
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   Load store
═══════════════════════════════════════════════════════════════════════════ */
async function loadStore(url) {
  showStatus('<div class="loader"></div><div class="status-text">Loading store…</div>');
  try {
    const data = await api('/api/store?url=' + encodeURIComponent(url));
    STATE.storeData = data;
    renderStore(data);
    clearStatus();
  } catch (err) {
    showStatus(`<div class="error-box">❌ ${err.message}</div>`);
  }
}

function renderStore(data) {
  // Avatar
  const wrap = $('store-avatar-wrap');
  wrap.innerHTML = '';
  if (data.avatar) {
    const img = document.createElement('img');
    img.src = data.avatar;
    img.className = 'store-avatar';
    img.onerror = () => { wrap.innerHTML = '<div class="avatar-placeholder">🏪</div>'; };
    wrap.appendChild(img);
  } else {
    wrap.innerHTML = '<div class="avatar-placeholder">🏪</div>';
  }

  $('store-name').textContent     = data.name || data.username;
  $('store-username').textContent = '@' + data.username;
  $('store-desc').textContent     = data.description || '';

  renderContact(data.contact, 'contact-wrap');

  // Albums
  const grid = $('albums-grid');
  grid.innerHTML = '';
  if (data.albums && data.albums.length) {
    $('albums-count').textContent = data.albums.length + ' albums';
    data.albums.forEach(album => {
      grid.appendChild(makeAlbumCard(album));
    });
    $('albums-section').style.display = 'block';
  }

  $('store-info').style.display = 'block';
}

function makeAlbumCard(album) {
  const card = el('div', 'album-card');
  card.title  = album.title;
  card.onclick = () => loadAlbum(album.url, STATE.storeData?.storeUrl || '');

  if (album.thumbnail) {
    const img = document.createElement('img');
    img.className = 'album-thumb';
    img.loading = 'lazy';
    img.alt = album.title;
    img.src = album.thumbnail;
    img.onerror = () => { img.replaceWith(makePlaceholder()); };
    card.appendChild(img);
  } else {
    card.appendChild(makePlaceholder());
  }

  const info = el('div', 'album-info');
  info.innerHTML = `<div class="album-name">${esc(album.title)}</div>`
                 + `<div class="album-count">${esc(album.count)}</div>`;
  card.appendChild(info);
  return card;
}

function makePlaceholder() {
  const d = el('div', 'album-thumb-placeholder');
  d.textContent = '🖼️';
  return d;
}

/* ═══════════════════════════════════════════════════════════════════════════
   Load album
═══════════════════════════════════════════════════════════════════════════ */
async function loadAlbum(albumUrl, storeUrl, page = 1) {
  showStatus('<div class="loader"></div><div class="status-text">Loading photos…</div>');

  if (page === 1) {
    STATE.photos = [];
    STATE.currentAlbum = albumUrl;
    STATE.currentPage  = 1;
  }

  try {
    const data = await api(`/api/album?url=${encodeURIComponent(albumUrl)}&page=${page}`);
    clearStatus();

    STATE.totalPages = data.pagination?.total || 1;
    STATE.currentPage = page;

    if (page === 1) {
      STATE.photos = data.photos;
      // Render gallery skeleton
      $('gallery-title').textContent = data.title || 'Album';
      $('gallery-count').textContent = data.photos.length + ' photos';
      $('photos-grid').innerHTML = '';
      renderPhotos(data.photos, 0);

      // Contact info (from album page if store hasn't loaded)
      if (!STATE.storeData) {
        renderContact(data.contact, 'contact-wrap');
        // Minimal store info
        $('store-info').style.display = 'block';
        $('store-name').textContent = data.username || '';
        $('store-username').textContent = data.storeUrl || '';
        $('store-avatar-wrap').innerHTML = '<div class="avatar-placeholder">🏪</div>';
        $('store-desc').textContent = '';
      }

      $('albums-section').style.display = 'none';
      $('gallery-section').style.display = 'block';

    } else {
      // Append more photos
      const offset = STATE.photos.length;
      STATE.photos = STATE.photos.concat(data.photos);
      renderPhotos(data.photos, offset);
      $('gallery-count').textContent = STATE.photos.length + ' photos';
    }

    // Show / hide load more
    if (STATE.currentPage < STATE.totalPages) {
      $('load-more-wrap').classList.remove('hidden');
      $('load-more-btn').textContent = `Load more (page ${STATE.currentPage+1}/${STATE.totalPages})`;
    } else {
      $('load-more-wrap').classList.add('hidden');
    }

  } catch (err) {
    showStatus(`<div class="error-box">❌ ${err.message}</div>`);
  }
}

function loadMorePhotos() {
  loadAlbum(STATE.currentAlbum, '', STATE.currentPage + 1);
}

function renderPhotos(photos, offset) {
  const grid = $('photos-grid');
  photos.forEach((photo, i) => {
    const idx  = offset + i;
    const item = el('div', 'photo-item');
    item.onclick = () => openLightbox(idx);

    const img = document.createElement('img');
    img.className = 'photo-img loading';
    img.loading = 'lazy';
    img.alt = photo.alt || `Photo ${idx + 1}`;
    img.src = photo.thumbnail || photo.full;
    img.onload  = () => img.classList.remove('loading');
    img.onerror = () => { item.style.display='none'; };

    const ov = el('div', 'photo-overlay', `<span class="photo-num">#${idx+1}</span>`);

    item.appendChild(img);
    item.appendChild(ov);
    grid.appendChild(item);
  });
}

function backToAlbums() {
  $('gallery-section').style.display = 'none';
  if (STATE.storeData?.albums?.length) {
    $('albums-section').style.display = 'block';
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   Contact
═══════════════════════════════════════════════════════════════════════════ */
const CONTACT_ICONS = {
  wechat:    '💬',
  whatsapp:  '📱',
  telegram:  '✈️',
  instagram: '📸',
  email:     '📧',
  qq:        '🐧',
};
const CONTACT_LINKS = {
  whatsapp:  v => `https://wa.me/${v.replace(/\D/g,'')}`,
  telegram:  v => `https://t.me/${v.replace('@','')}`,
  email:     v => `mailto:${v}`,
  instagram: v => `https://instagram.com/${v.replace('@','')}`,
};

function renderContact(contact, wrapperId) {
  const wrap = $(wrapperId);
  if (!contact || !Object.keys(contact).length) { wrap.innerHTML = ''; return; }

  const card  = el('div', 'contact-card');
  const title = el('div', 'contact-title', 'Contact Seller');
  const grid  = el('div', 'contact-grid');

  card.appendChild(title);
  card.appendChild(grid);

  Object.entries(contact).forEach(([key, info]) => {
    const row    = el('div', 'contact-row');
    const icon   = el('div', 'contact-icon', CONTACT_ICONS[key] || '📌');
    const infoEl = el('div', 'contact-info');
    const label  = el('div', 'contact-label', info.label);
    const value  = el('div', 'contact-value', esc(info.value));
    const cpBtn  = el('button', 'copy-btn', 'Copy');

    cpBtn.onclick = () => copyToClipboard(info.value, cpBtn);

    infoEl.appendChild(label);
    infoEl.appendChild(value);
    row.appendChild(icon);
    row.appendChild(infoEl);

    // Deep link button if available
    if (CONTACT_LINKS[key]) {
      const linkBtn = el('a', 'copy-btn');
      linkBtn.textContent = 'Open';
      linkBtn.href = CONTACT_LINKS[key](info.value);
      linkBtn.target = '_blank';
      linkBtn.rel = 'noopener';
      linkBtn.style.cssText = 'text-decoration:none;';
      row.appendChild(linkBtn);
    }

    row.appendChild(cpBtn);
    grid.appendChild(row);
  });

  wrap.innerHTML = '';
  wrap.appendChild(card);
}

/* ═══════════════════════════════════════════════════════════════════════════
   Lightbox
═══════════════════════════════════════════════════════════════════════════ */
function openLightbox(idx) {
  STATE.lbIndex = idx;
  updateLightbox();
  $('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  $('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function lbNav(dir) {
  const len = STATE.photos.length;
  STATE.lbIndex = (STATE.lbIndex + dir + len) % len;
  updateLightbox();
}
function updateLightbox() {
  const photo = STATE.photos[STATE.lbIndex];
  const img   = $('lb-img');
  img.src = photo.full || photo.thumbnail;
  $('lb-counter-text').textContent = `${STATE.lbIndex + 1} / ${STATE.photos.length}`;
}
async function downloadCurrent() {
  const photo = STATE.photos[STATE.lbIndex];
  const url   = photo.full || photo.thumbnail;
  // Use our proxy endpoint to force download
  const a     = document.createElement('a');
  a.href      = `/proxy/image?url=${encodeURIComponent(url)}`;
  a.download  = `photo-${STATE.lbIndex + 1}.jpg`;
  a.click();
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (!$('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'Escape')     closeLightbox();
});

/* ═══════════════════════════════════════════════════════════════════════════
   Share
═══════════════════════════════════════════════════════════════════════════ */
function openShare(target) {
  STATE.shareTarget = target;
  const shareUrl = target === 'album' && STATE.currentAlbum
    ? window.location.origin + '/?url=' + encodeURIComponent(STATE.currentAlbum)
    : window.location.origin + '/?url=' + encodeURIComponent(STATE.currentUrl);
  $('share-url-input').value = shareUrl;
  $('share-modal').classList.add('open');
}
function closeShare() { $('share-modal').classList.remove('open'); }
function copyShareUrl() { copyToClipboard($('share-url-input').value); toast('Link copied!'); }
function shareWhatsApp() {
  window.open('https://wa.me/?text=' + encodeURIComponent($('share-url-input').value), '_blank');
}
function shareTelegram() {
  window.open('https://t.me/share/url?url=' + encodeURIComponent($('share-url-input').value), '_blank');
}
function shareTwitter() {
  window.open('https://twitter.com/intent/tweet?url=' + encodeURIComponent($('share-url-input').value), '_blank');
}

/* ═══════════════════════════════════════════════════════════════════════════
   Copy all image URLs
═══════════════════════════════════════════════════════════════════════════ */
async function copyAllImages() {
  const urls = STATE.photos.map(p => p.full || p.thumbnail).join('\n');
  await copyToClipboard(urls);
  toast(`✅ ${STATE.photos.length} image URLs copied!`);
}

/* ═══════════════════════════════════════════════════════════════════════════
   Utilities
═══════════════════════════════════════════════════════════════════════════ */
async function api(path) {
  const res = await fetch(path);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    }
    toast('Copied!');
  } catch {
    toast('Could not copy — try manually');
  }
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════════════════════════
   On load: check ?url= param in query string
═══════════════════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const preurl = params.get('url');
  if (preurl) {
    $('url-input').value = preurl;
    load();
  }
});
</script>
</body>
</html>
